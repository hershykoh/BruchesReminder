name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create GitHub releases and upload assets

jobs:
  # ─── Build: one job per platform ────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false   # keep building other platforms even if one fails
      matrix:
        include:
          - name: Windows
            os: windows-latest
            artifact_name: windows-installer

          - name: macOS
            os: macos-latest
            artifact_name: mac-dmg

          - name: Linux
            os: ubuntu-latest
            artifact_name: linux-appimage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Strip leading "v" from tag and stamp package.json version
      - name: Set version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          npm pkg set version="$TAG"
          echo "Building version $TAG"

      # ── Install dependencies ────────────────────────────────────────────────
      # Skip the Electron binary postinstall on all platforms:
      # electron-builder downloads its own Electron for packaging anyway.
      - name: Install dependencies
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: npm ci

      # ── Generate icon assets ────────────────────────────────────────────────
      - name: Generate PNG + ICO icons
        run: node scripts/generate-icon.js

      # On macOS, electron-builder needs ICNS; sips + iconutil convert PNG → ICNS
      - name: Convert PNG to ICNS (macOS only)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p assets/icon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size assets/icon.png \
              --out "assets/icon.iconset/icon_${size}x${size}.png"    >/dev/null
          done
          for size in 32 64 256 512; do
            double=$((size * 2))
            sips -z $double $double assets/icon.png \
              --out "assets/icon.iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns assets/icon.iconset -o assets/icon.icns
          echo "✓ Generated assets/icon.icns"

      - name: Use ICNS icon for macOS build
        if: runner.os == 'macOS'
        run: npm pkg set build.mac.icon=assets/icon.icns

      # ── Compile TypeScript ──────────────────────────────────────────────────
      - name: Build TypeScript
        run: npm run build

      # ── Package with electron-builder ───────────────────────────────────────
      - name: Build Windows installer (NSIS)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment + add secrets for code-signing:
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish never

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment + add secrets for notarization:
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: npx electron-builder --mac --publish never

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux --publish never

      # ── Show what was built ─────────────────────────────────────────────────
      - name: List release/ directory
        shell: bash
        run: ls -lh release/ 2>/dev/null || echo "release/ is empty"

      # ── Upload artifacts (only real installer files, skip yml metadata) ─────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
          if-no-files-found: error   # fail loudly if nothing was built
          retention-days: 7

  # ─── Publish: create the GitHub Release ─────────────────────────────────────
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Run even if some platform builds failed (fail-fast: false means others still ran)
    if: ${{ !cancelled() }}

    steps:
      - name: Checkout (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Download all platform artifacts into one tree: artifacts/<name>/file
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # omitting 'name' downloads every artifact from this run

      - name: List downloaded artifacts
        run: find artifacts -type f | sort

      # Build a simple changelog from commits since the previous tag
      - name: Generate changelog
        shell: bash
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${GITHUB_REF_NAME}$" | head -n1 || true)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%an)" --no-merges > changelog.txt
          else
            git log --pretty=format:"- %s (%an)" --no-merges | head -50 > changelog.txt
          fi
          cat changelog.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Bracha Reminder ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: changelog.txt
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
